<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="stylesheet.css">

    <title>Imposter</title>

</head>

<body>
    <script src="js/bootstrap.js"></script>
    <div class="position-absolute top-50 start-50 translate-middle">
        <div class="card" style="width: 18rem;">
            <img src="..." class="card-img-top" alt="...">
            <div class="card-body">
                <h5 id="role" class="card-title">Role</h5>
                <p id="desc" class="card-text">Description</p>
                <p id="button" class="btn btn-primary" style="" onmousedown="mouseDown()" onmouseup="mouseUp()">test</p>
            </div>
        </div>
    </div>
    <p id="button" onmousedown="mouseDown()" onmouseup="mouseUp()">test</p>


    <script>
        function mouseDown() {
            document.getElementById("button").style.color = "red";
            document.getElementById("role").textContent = "Imposter"
        }
        function mouseUp() {
            document.getElementById("button").style.color = "blue";
            document.getElementById("role").textContent = "Role"
        }
    </script>


</body>

</html>
