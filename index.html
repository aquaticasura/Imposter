<body style="background: white">

                    style="margin-top: 20px; width:350px;">
                    Continue</p>
            </div>
            <div id="holder" class="mb-3" style="width:250px; margin:50px">

                <div id="0">

                    <input class="form-control">
                </div>
                <div id="1">

            </div>
            <p id="play" onmousedown="play()" ontouchstart="play()" class="btn btn-primary btn-lg" style="margin-top: 20px; width:350px;">Start Game</p>

                <p id="demo"></p>
                <p id="button" class="btn btn-primary" style="">test</p>
            </div>
        </div>
    </div>




    <script>

        document.getElementById("card").style.display = "none";
        document.getElementById("0").style.display = "none";
        document.getElementById("1").style.display = "none";
        document.getElementById("2").style.display = "none";

        document.getElementById("4").style.display = "none";
        document.getElementById("5").style.display = "none";
        document.getElementById("play").style.display = "none";

        function start() {
            let i = 0;
            const players = document.getElementById("playeramount").value;
            while (i < players) {
                document.getElementById(i).style.display = "block";
                document.getElementById("play").style.display = "block"
                i++;
                console.log("+1")
            }
        }


        function play() {
            const players = document.getElementById("playeramount").value
             while (i < players) {
                console.log("+1")
            }
            document.getElementById("card").style.display = "block";


            const players1 = [player1, player2, player3, player4, player5]
            document.getElementById("demo").innerHTML = players[0];
        }


        const list = ['apple', 'banana', 'cherry', 'date'];
        const randomItem = list[Math.floor(Math.random() * list.length)];
        document.getElementById("desc").innerHTML = randomItem;

        function mouseDown() {
            document.getElementById("button").style.color = "red";
            document.getElementById("role").textContent = "Imposter"
        }
        function mouseUp() {
            document.getElementById("button").style.color = "blue";
            document.getElementById("role").textContent = "Role"
        }
    </script>

</html>
